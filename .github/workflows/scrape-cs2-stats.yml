name: Scrape Esports Stats

on:
  schedule:
    # Chạy tự động mỗi 1 tiếng
    - cron: '0 * * * *'
  workflow_dispatch: # Cho phép bấm chạy thủ công trên giao diện Github

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm install

      - name: Run CS2 Scraper
        working-directory: ./backend
        run: npm run scrape

      - name: Run LOL Scraper
        working-directory: ./backend
        run: node scripts/scrapeLOLStats.cjs

      - name: Check for changes
        id: git-check
        run: |
          git status --porcelain
          echo "changed=$(git status --porcelain | wc -l)" >> $GITHUB_OUTPUT

      - name: Commit and Push changes
        if: steps.git-check.outputs.changed > 0
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add backend/data/*.json
          git commit -m "chore: auto-update esports stats [skip ci]"
          git push
